name: update-superset
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # runs weekly on Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            extra-substituters = https://cache.nixos.org
            accept-flake-config = true
      - name: Read current version
        id: before
        run: echo "version=$(sed -n 's/^[[:space:]]*version = "\(.*\)";/\1/p' packages/superset.nix | head -1)" >> "$GITHUB_OUTPUT"
      - name: Run package update script
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: nix run --impure .#superset.passthru.updateScript
      - name: Read new version
        id: after
        run: echo "version=$(sed -n 's/^[[:space:]]*version = "\(.*\)";/\1/p' packages/superset.nix | head -1)" >> "$GITHUB_OUTPUT"
      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          commit-message: "superset: ${{ steps.before.outputs.version }} -> ${{ steps.after.outputs.version }}"
          title: "superset: ${{ steps.before.outputs.version }} -> ${{ steps.after.outputs.version }}"
          body: |
            Automated update for the Superset Desktop AppImage
            (https://github.com/superset-sh/superset/releases/latest).
          branch: automated/superset-update
          delete-branch: true
          add-paths: packages/superset.nix
