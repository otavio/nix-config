name: "CI"

on:
  pull_request:
    paths:
      - '**.nix'
      - 'flake.lock'
      - '.github/workflows/ci.yaml'
  push:
    branches: [ master ]
    paths:
      - '**.nix'
      - 'flake.lock'
      - '.github/workflows/ci.yaml'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
      - uses: ossystems/nix-actions@v1
        with:
          install-nix: true
          flake-check: false
          build-hosts: false
          build-devshells: false
          build-attrs: matrix

  nix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        homeConfiguration:
          - "otavio@generic-x86"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
      - uses: ossystems/nix-actions@v1
        with:
          install-nix: true
          flake-check: false
          build-hosts: false
          build-devshells: false
      - run: nix -L build ".#homeConfigurations.${{ matrix.homeConfiguration }}.activationPackage"
